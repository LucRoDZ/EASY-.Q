# ── HTTPS (after SSL is provisioned) ──────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.easy.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.easy.fr;

    ssl_certificate     /etc/letsencrypt/live/api.easy.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.easy.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # SSE (streaming chat) — disable buffering
        proxy_buffering    off;
        proxy_cache        off;

        # WebSocket (KDS)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;

        # Large file uploads (menu PDFs)
        client_max_body_size 20M;
    }
}
