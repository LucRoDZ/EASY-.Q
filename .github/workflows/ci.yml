name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test_easyq.db
      CLERK_JWKS_URL: ""
      CLERK_WEBHOOK_SECRET: ""
      ADMIN_USER_IDS: ""
      GEMINI_API_KEY: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      RESEND_API_KEY: ""
      R2_BUCKET_NAME: ""
      R2_ACCESS_KEY_ID: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_ENDPOINT_URL: ""
      REDIS_URL: ""
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-cov ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Run tests with coverage
        working-directory: backend
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=70

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_API_BASE_URL: http://localhost:8000
